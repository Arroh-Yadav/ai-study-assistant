<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Buddy - AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .chat-container { height: calc(100vh - 220px); }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100">
    <div class="max-w-5xl mx-auto h-screen flex flex-col">
        <!-- Header -->
        <header class="p-4 border-b bg-white dark:bg-gray-900 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="text-3xl p-2 hover:bg-gray-200 dark:hover:bg-gray-800 rounded-lg">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="text-3xl font-bold text-indigo-600">🤖 Study Buddy</h1>
            </div>
            <button onclick="toggleTheme()" id="theme-btn" class="p-3 rounded-2xl bg-gray-200 dark:bg-gray-800">
                <i class="fas fa-moon"></i>
            </button>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <!-- Sidebar -->
            <div id="sidebar" class="w-72 bg-white dark:bg-gray-900 border-r hidden md:block transition-all">
                <div class="p-6">
                    <h2 class="text-lg font-semibold mb-4">Tools</h2>
                    <button onclick="exportToPDF()" class="w-full text-left p-4 hover:bg-indigo-50 dark:hover:bg-gray-800 rounded-2xl flex items-center gap-3">
                        <i class="fas fa-file-pdf text-red-500"></i>
                        <span>Export Chat as PDF</span>
                    </button>
                </div>
            </div>

            <!-- Chat Area -->
            <div class="flex-1 flex flex-col">
                <div id="chat" class="chat-container overflow-y-auto p-6 space-y-6 bg-white dark:bg-gray-900"></div>

                <!-- Controls -->
                <div class="p-4 border-t bg-white dark:bg-gray-900">
                    <div class="flex items-center gap-3 mb-3">
                        <span class="text-sm text-gray-500">Response Length:</span>
                        <input type="range" id="token-slider" min="300" max="1500" value="800" step="100" 
                               class="flex-1 accent-indigo-600">
                        <span id="token-value" class="font-medium w-20 text-right">Medium</span>
                    </div>

                    <div class="flex gap-3">
                        <input type="text" id="message" 
                               class="flex-1 px-5 py-4 rounded-3xl border dark:bg-gray-800 focus:outline-none focus:border-indigo-500"
                               placeholder="Ask me anything about studies..." 
                               onkeypress="if(event.key === 'Enter') sendMessage()">
                        <button onclick="sendMessage()" 
                                class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 rounded-3xl">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Theme
        let isDark = localStorage.getItem('dark') === 'true';
        document.documentElement.classList.toggle('dark', isDark);

        function toggleTheme() {
            isDark = !isDark;
            document.documentElement.classList.toggle('dark', isDark);
            localStorage.setItem('dark', isDark);
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('hidden');
        }

        function addMessage(sender, text, isTyping = false) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'}`;
            
            if (isTyping) {
                div.innerHTML = `<div class="bg-gray-100 dark:bg-gray-800 px-5 py-3 rounded-3xl">AI is thinking...</div>`;
            } else {
                div.innerHTML = `
                    <div class="${sender === 'user' ? 'bg-indigo-600 text-white' : 'bg-gray-100 dark:bg-gray-800'} px-5 py-3 rounded-3xl max-w-[75%]">
                        ${text}
                    </div>`;
            }
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('message');
            const msg = input.value.trim();
            if (!msg) return;

            const maxTokens = document.getElementById('token-slider').value;

            addMessage('user', msg);
            input.value = '';
            addMessage('ai', '', true);

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: msg, max_tokens: parseInt(maxTokens) })
                });
                const data = await res.json();

                // Remove typing
                const chat = document.getElementById('chat');
                chat.removeChild(chat.lastChild);

                if (data.error) {
                    addMessage('ai', `❌ ${data.error}`);
                } else {
                    addMessage('ai', data.response);
                }
            } catch (e) {
                document.getElementById('chat').removeChild(document.getElementById('chat').lastChild);
                addMessage('ai', '❌ Connection error');
            }
        }

        function exportToPDF() {
            alert("PDF Export feature coming soon!");
        }

        // Welcome
        window.onload = () => {
            addMessage('ai', "👋 Hi! I'm your AI Study Buddy.<br><br>Ask me anything — explanations, quizzes, study plans, etc.");
        };
    </script>
</body>
</html>
