<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Study Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
      body {
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      .chat-container {
        height: calc(100vh - 180px);
      }
      .message {
        max-width: 80%;
      }
      .user {
        background: #6366f1;
        color: white;
      }
      .ai {
        background: #f1f5f9;
        color: #1e2937;
      }
      .dark .ai {
        background: #334155;
        color: #e2e8f0;
      }
    </style>
  </head>
  <body
    class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen"
  >
    <div class="max-w-5xl mx-auto">
      <!-- Header -->
      <header
        class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900"
      >
        <div class="flex items-center gap-3">
          <button
            onclick="toggleSidebar()"
            class="text-2xl p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg"
          >
            <i class="fas fa-bars"></i>
          </button>
          <div>
            <h1 class="text-2xl font-bold text-indigo-600">🤖 Study Buddy</h1>
            <p class="text-sm text-gray-500 dark:text-gray-400">
              Powered by Gemini
            </p>
          </div>
        </div>

        <button
          onclick="toggleTheme()"
          id="theme-toggle"
          class="p-3 rounded-xl bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700"
        >
          <i class="fas fa-moon text-xl"></i>
        </button>
      </header>

      <div class="flex">
        <!-- Sidebar -->
        <div
          id="sidebar"
          class="fixed left-0 top-0 h-full w-72 bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 transform -translate-x-full transition-transform duration-300 shadow-xl z-50"
        >
          <div class="p-6">
            <h2 class="font-semibold text-lg mb-6 flex items-center gap-2">
              <i class="fas fa-book"></i> Tools
            </h2>

            <button
              onclick="exportToPDF()"
              class="w-full flex items-center gap-3 px-4 py-4 text-left hover:bg-indigo-50 dark:hover:bg-gray-800 rounded-xl text-gray-700 dark:text-gray-300"
            >
              <i class="fas fa-file-pdf text-red-500"></i>
              <div>
                <div class="font-medium">Export Chat as PDF</div>
                <div class="text-xs text-gray-500">Structured summary</div>
              </div>
            </button>
          </div>
        </div>

        <!-- Main Chat Area -->
        <!-- Replace the bottom input area and add this slider -->

        <div class="mt-4 flex flex-col gap-3">
          <!-- Response Length Slider -->
          <div class="flex items-center gap-3 px-2">
            <span
              class="text-sm text-gray-500 dark:text-gray-400 whitespace-nowrap"
              >Response Length:</span
            >
            <input
              type="range"
              id="token-slider"
              min="300"
              max="1500"
              value="800"
              step="100"
              class="flex-1 accent-indigo-600"
            />
            <span id="token-value" class="text-sm font-medium w-16 text-right"
              >Medium</span
            >
          </div>

          <div class="flex gap-3">
            <input
              type="text"
              id="message"
              class="flex-1 px-6 py-4 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-3xl focus:outline-none focus:border-indigo-500"
              placeholder="Ask anything about studies..."
              onkeypress="if (event.key === 'Enter') sendMessage();"
            />

            <button
              onclick="sendMessage()"
              class="px-8 bg-indigo-600 hover:bg-indigo-700 text-white rounded-3xl font-semibold flex items-center gap-2"
            >
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const chat = document.getElementById("chat");
      const messageInput = document.getElementById("message");
      let isDark = localStorage.getItem("darkMode") === "true";

      function toggleTheme() {
        isDark = !isDark;
        document.documentElement.classList.toggle("dark", isDark);
        localStorage.setItem("darkMode", isDark);
        updateThemeIcon();
      }

      function updateThemeIcon() {
        const icon = document.getElementById("theme-toggle").querySelector("i");
        icon.classList.toggle("fa-moon", !isDark);
        icon.classList.toggle("fa-sun", isDark);
      }

      function toggleSidebar() {
        const sidebar = document.getElementById("sidebar");
        sidebar.classList.toggle("-translate-x-full");
      }

      function addMessage(sender, text, isTyping = false) {
        const div = document.createElement("div");
        div.className = `flex ${sender === "user" ? "justify-end" : "justify-start"} message`;

        if (isTyping) {
          div.innerHTML = `
                    <div class="max-w-[80%] px-5 py-3 rounded-3xl bg-gray-100 dark:bg-gray-800">
                        <span class="typing">AI is thinking<span class="animate-pulse">...</span></span>
                    </div>`;
        } else {
          div.innerHTML = `
                    <div class="${sender === "user" ? "user" : "ai"} px-5 py-3 rounded-3xl">
                        ${text}
                    </div>`;
        }
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
      }

      function removeTyping() {
        const typing = chat.querySelector(".typing");
        if (typing) typing.parentElement.parentElement.remove();
      }

      async function sendMessage() {
        const msg = messageInput.value.trim();
        if (!msg) return;

        addMessage("user", msg);
        messageInput.value = "";
        addMessage("ai", "", true);

        try {
          const res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: msg }),
          });
          const data = await res.json();

          removeTyping();
          if (data.error) {
            addMessage("ai", `❌ ${data.error}`);
          } else {
            addMessage("ai", data.response);
          }
        } catch (err) {
          removeTyping();
          addMessage("ai", "❌ Connection error. Please try again.");
        }
      }

      function exportToPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        doc.setFontSize(18);
        doc.text("AI Study Assistant - Chat Summary", 20, 20);
        doc.setFontSize(12);
        doc.text(`Generated on: ${new Date().toLocaleString()}`, 20, 30);

        let y = 50;
        const messages = chat.children;

        for (let msg of messages) {
          const text = msg.textContent.trim();
          if (text) {
            const lines = doc.splitTextToSize(text, 170);
            doc.text(lines, 20, y);
            y += lines.length * 7 + 10;
            if (y > 280) {
              doc.addPage();
              y = 20;
            }
          }
        }

        doc.save("study-assistant-chat.pdf");
        alert("✅ Chat exported as PDF!");
      }

      // Welcome Message + Theme Init
      window.onload = () => {
        document.documentElement.classList.toggle("dark", isDark);
        updateThemeIcon();

        addMessage(
          "ai",
          `👋 Hi! I'm your AI Study Assistant.<br><br>How can I help you today?<br><br>You can ask me to:<br>• Explain any topic<br>• Generate quizzes<br>• Summarize notes<br>• Create study plans`,
        );
      };
    </script>
  </body>
</html>
